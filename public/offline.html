<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline | HRGA Activity</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            background: #f5f8fc;
            color: #1f2937;
        }

        .offline-card {
            width: min(92vw, 420px);
            border: 1px solid #dbeafe;
            border-radius: 12px;
            background: #fff;
            padding: 28px;
            box-shadow: 0 16px 40px rgba(15, 95, 184, .12);
            text-align: center;
        }

        .offline-card img {
            width: 160px;
            max-width: 80%;
            margin-bottom: 18px;
        }

        h1 {
            margin: 0 0 10px;
            color: #0f5fb8;
            font-size: 24px;
        }

        p {
            margin: 0;
            color: #64748b;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <main class="offline-card">
        <img src="/images/SCM-transparent.png" alt="PT Sulawesi Cahaya Mineral">
        <h1>Aplikasi sedang offline</h1>
        <p>Periksa koneksi internet atau jaringan lokal, lalu coba buka kembali halaman ini.</p>
    </main>
</body>
</html>
